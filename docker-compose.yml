services:

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Adithya8@
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pAdithya8@"]
      interval: 5s
      timeout: 5s
      retries: 20

  gateway:
    build: ./server/gateway
    ports:
      - "4000:3000"
    depends_on:
      - auth
      - content
      - user-activity

  auth:
    build: ./server/auth
    restart: unless-stopped
    ports:
      - "4001:3001"
    env_file:
      - ./server/auth/.env
    depends_on:
      db:
        condition: service_healthy

  content:
    build: ./server/content
    restart: unless-stopped
    ports:
      - "4002:3002"
    environment:
      REDIS_URL: redis://redis:6379
    env_file:
      - ./server/content/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  realtime:
    build: ./server/realtime
    ports:
      - "4003:3003"
    env_file:
      - ./server/realtime/.env

  user-activity:
    build: ./server/userActivity
    restart: unless-stopped
    ports:
      - "4004:3004"
    env_file:
      - ./server/userActivity/.env
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
